name: Daily Dependency Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g renovate

      - name: Set timestamp
        id: vars
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LABEL=$(date -u +%Y-%m-%d_%H%M%S)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Read repo list
        id: repos
        run: |
          REPOS=$(cat main/config/github.json | jq -r '.repositories | join(" ")')
          echo "list=$REPOS" >> "$GITHUB_OUTPUT"

      - name: Run Renovate scan
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          mkdir -p main/reports
          renovate \
            --platform=github \
            --dry-run=full \
            --report-type=file \
            --report-path=main/reports/latest.json \
            ${{ steps.repos.outputs.list }}

      - name: Generate report
        run: |
          python3 main/scripts/compare.py \
            data/baseline.json \
            main/reports/latest.json \
            main/reports/scan-report.json

      - name: Update baseline
        run: |
          cp main/reports/latest.json data/baseline.json
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline.json
          git diff --cached --quiet || git commit -m "baseline ${{ steps.vars.outputs.timestamp }}"
          git push origin data

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ steps.vars.outputs.label }}
          path: main/reports/scan-report.json
          retention-days: 90
