name: Dependency Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  GCS_BUCKET: welldev_renovate_reports_gulli
  GCS_BUCKET_PREFIX: trueact-test
  REPORT_DIR: reports

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          HAS_GCS_SA_KEY: ${{ secrets.GCS_SA_KEY != '' }}
        run: |
          [ "$HAS_GCS_SA_KEY" = "true" ] || { echo "::error::GCS_SA_KEY secret missing"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Renovate
        run: npm install -g renovate

      - name: Run Renovate scan
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_CONFIG_FILE: renovate/renovate.json
          LOG_LEVEL: debug
        run: |
          mkdir -p ${{ env.REPORT_DIR }}
          renovate \
            --platform=github \
            --dry-run=full \
            --report-type=file \
            --report-path=${{ env.REPORT_DIR }}/renovate-report.json \
            ${{ github.repository }}

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        run: |
          gsutil cp ${{ env.REPORT_DIR }}/renovate-report.min.json \
            gs://${{ env.GCS_BUCKET }}/${{ env.GCS_BUCKET_PREFIX }}/${{ github.event.repository.name }}/renovate-report.json
