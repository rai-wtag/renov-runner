name: Daily Dependency Scan

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Renovate
        run: npm install -g renovate

      - name: Set timestamp
        id: vars
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      - name: Create directories
        run: |
          mkdir -p reports/latest
          mkdir -p reports/history/${{ steps.vars.outputs.timestamp }}

      - name: Read repo list from config
        id: repos
        run: |
          REPOS=$(cat config/github.json | jq -r '.repositories | join(" ")')
          echo "list=$REPOS" >> "$GITHUB_OUTPUT"
          echo "Scanning repos: $REPOS"

      - name: Run Renovate scan
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          renovate \
            --platform=github \
            --dry-run=full \
            --report-type=file \
            --report-path=reports/latest/github.json \
            ${{ steps.repos.outputs.list }}

      - name: Compare with previous
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          python3 scripts/compare.py \
            reports/previous/github.json \
            reports/latest/github.json
          echo "════════════════════════════════════════════"

      - name: Update baseline
        run: |
          cp reports/latest/github.json reports/previous/github.json

      - name: Archive to history
        run: |
          cp reports/latest/github.json reports/history/${{ steps.vars.outputs.timestamp }}/github.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📊 scan ${{ steps.vars.outputs.timestamp }}"
          git push