name: Daily Dependency Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g renovate

      - name: Set timestamp
        id: vars
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LABEL=$(date -u +%Y-%m-%d_%H%M%S)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Restore baseline from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: baseline/baseline.json
          key: baseline-never-matches
          restore-keys: |
            baseline-

      - name: Check baseline status
        run: |
          if [ -f baseline/baseline.json ]; then
            echo "Baseline restored from cache"
            echo "Size: $(wc -c < baseline/baseline.json) bytes"
          else
            echo "No baseline found â€” first run, creating empty baseline"
            mkdir -p baseline
            echo '{"repositories":{}}' > baseline/baseline.json
          fi

      - name: Read repo list
        id: repos
        run: |
          REPOS=$(cat config/github.json | jq -r '.repositories | join(" ")')
          echo "list=$REPOS" >> "$GITHUB_OUTPUT"

      - name: Run Renovate scan
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          mkdir -p reports
          renovate \
            --platform=github \
            --dry-run=full \
            --report-type=file \
            --report-path=reports/latest.json \
            ${{ steps.repos.outputs.list }}

      - name: Generate report
        run: |
          python3 scripts/compare.py \
            baseline/baseline.json \
            reports/latest.json \
            reports/scan-report.json \
            reports/summary.md

      - name: Print summary
        run: cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update baseline for next run
        run: |
          mkdir -p baseline
          cp reports/latest.json baseline/baseline.json

      - name: Save baseline to cache
        uses: actions/cache/save@v4
        with:
          path: baseline/baseline.json
          key: baseline-${{ steps.vars.outputs.label }}

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ steps.vars.outputs.label }}
          path: reports/scan-report.json
          retention-days: 90