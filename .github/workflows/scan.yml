name: Daily Dependency Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g renovate

      - name: Set timestamp
        id: vars
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      - run: mkdir -p reports/latest reports/previous

      # restore the baseline cache (if exists)
      - name: Restore baseline cache
        uses: actions/cache@v4
        with:
          path: reports/previous/github.json
          key: renovate-baseline-v1

      # ensure baseline file exists
      - name: Ensure baseline exists
        run: |
          if [ ! -f reports/previous/github.json ]; then
            echo '{"repositories":{}}' > reports/previous/github.json
            echo "First run — no previous baseline found."
          fi

      - name: Read repo list
        id: repos
        run: |
          REPOS=$(cat config/github.json | jq -r '.repositories | join(" ")')
          echo "list=$REPOS" >> "$GITHUB_OUTPUT"

      - name: Run Renovate scan
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          renovate \
            --platform=github \
            --dry-run=full \
            --report-type=file \
            --report-path=reports/latest/github.json \
            ${{ steps.repos.outputs.list }}

      - name: Generate report
        run: |
          python3 scripts/compare.py \
            reports/previous/github.json \
            reports/latest/github.json \
            reports/latest/scan-report.json

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ steps.vars.outputs.timestamp }}
          path: reports/latest/scan-report.json
          retention-days: 90

      # update baseline for the next run
      - name: Update baseline for next run
        run: |
          cp reports/latest/github.json reports/previous/github.json

      # cache the new baseline for next run
      - name: Cache new baseline
        uses: actions/cache@v4
        with:
          path: reports/previous/github.json
          key: renovate-baseline-v1
          save-on-error: true
          save-always: true
