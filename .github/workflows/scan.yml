name: Renovate Multi-Repo Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' 

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Renovate
        run: npm install -g renovate

      - name: Prepare report directories
        run: |
          mkdir -p reports/latest reports/previous

      - name: Run Renovate for each repo
        run: |
          for repo in $(jq -r '.repositories | join(" ")' config/github.json); do
            echo "Scanning $repo..."
            renovate --dry-run --repository=$repo --log-level info
            # Move latest scan to repo-specific file
            if [ -f reports/latest/github.json ]; then
              mv reports/latest/github.json reports/latest/${repo}.json
            fi
          done

      - name: Compare scans and generate report
        run: python3 scripts/compare.py

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ github.run_id }}
          path: reports/latest/scan-report.json
