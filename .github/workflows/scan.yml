name: Renovate Multi‑Repo Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Renovate
        run: npm install -g renovate

      - name: Create report dirs
        run: mkdir -p reports/latest reports/previous

      - name: Restore baseline cache
        uses: actions/cache@v4
        with:
          path: reports/previous
          key: renovate-baseline-v1
          restore-keys: renovate-baseline-v1

      # Loop over all repos and scan them one by one
      - name: Run Renovate for each repo
        run: |
          REPO_LIST=$(jq -r '.repositories | join(" ")' config/github.json)
          echo "Repos to scan: $REPO_LIST"
          for repo in $REPO_LIST; do
            SHORT=$(echo "$repo" | sed 's/\//_/g')

            echo "Checking out $repo"
            # Checkout each repo into its own folder using your PAT
            gh auth setup-git
            git config --global url."https://${{ secrets.PAT }}:@github.com/".insteadOf "https://github.com/"
            git clone "https://github.com/${repo}.git" "repos/${SHORT}"

            echo "Running Renovate in repos/${SHORT}"
            (
              cd "repos/${SHORT}"
              renovate --dry-run --platform=github --report-type=file --report-path=../../reports/latest/${SHORT}.json
            )
          done

      - name: Compare all scans
        run: python3 scripts/compare.py

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ github.run_id }}
          path: reports/latest/scan-report.json

      - name: Update baseline
        run: |
          cp reports/latest/*.json reports/previous/

      - name: Save new baseline cache
        uses: actions/cache@v4
        with:
          path: reports/previous
          key: renovate-baseline-v1
