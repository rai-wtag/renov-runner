name: Daily Dependency Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: false

      - name: Install Bundler
        run: gem install bundler

      - name: Install Renovate
        run: |
          npm install -g renovate
          echo "Renovate version: $(renovate --version)"

      - name: Read repo list
        id: repos
        run: |
          REPOS=$(jq -r '.repositories | join(" ")' config/github.json)
          echo "list=$REPOS" >> "$GITHUB_OUTPUT"
          echo "Scanning: $REPOS"

      - name: Run Renovate scan
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          LOG_LEVEL: debug
        run: |
          mkdir -p reports
          renovate \
            --platform=github \
            --dry-run=full \
            --report-type=file \
            --report-path=reports/renovate-report.json \
            ${{ steps.repos.outputs.list }}

      - name: Validate report
        run: |
          if [ ! -f reports/renovate-report.json ]; then
            echo "Report not generated"
            exit 1
          fi
          SIZE=$(wc -c < reports/renovate-report.json)
          echo "Report generated: ${SIZE} bytes"
          REPO_COUNT=$(jq '.repositories | keys | length' reports/renovate-report.json 2>/dev/null || echo "unknown")
          echo "Repositories scanned: ${REPO_COUNT}"

      - name: Minify report
        run: |
          jq -c '.' reports/renovate-report.json > reports/renovate-report.min.json
          ORIG=$(wc -c < reports/renovate-report.json)
          MIN=$(wc -c < reports/renovate-report.min.json)
          echo "Original: ${ORIG} bytes → Minified: ${MIN} bytes"

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SA_KEY }}

      - name: Upload report to GCS
        run: |
          gsutil cp reports/renovate-report.min.json \
            gs://welldev_renovate_reports_gulli/renov-runner/renovate-report.json
          echo "Uploaded to gs://welldev_renovate_reports_gulli/renov-runner/"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: renovate-report
          path: reports/renovate-report.min.json
          retention-days: 90
          overwrite: true
          if-no-files-found: error
